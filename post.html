<script>
const FALLBACK_POSTS = [{"title": "The Table Was Always My Classroom", "slug": "table-was-my-classroom", "category": "From My Table", "excerpt": "A reflection on wine, hospitality and the power of gathering.", "content": "\n        <p class=\"post-meta\">Vine to Soul\u2122 Journal</p>\n        <p>Long before I understood wine as an industry, I understood it as a table. Someone pouring, someone listening, a story arriving between the second glass and the third. That's where I actually learned about hospitality \u2014 not in a classroom, but at a table that never seemed to empty.</p>\n        <p>Every culture I've lived in has had its own version of that table. What's stayed constant is the role it plays: it slows people down long enough to actually see each other. That, more than any tasting note, is what I try to build into every Liz Ogumbo Wines\u2122 experience.</p>\n        <p>Wine, Wisdom &amp; Wonders\u2122 grew out of that same instinct \u2014 the belief that the most useful wine education isn't about memorising regions, it's about learning to host. To pour with intention. To let a glass be an invitation rather than a performance.</p>\n        <p>So if you're building your own table, start small. One good bottle, one honest question, and the patience to let the conversation breathe. The rest tends to follow.</p>\n        ", "hero_image": "https://static.wixstatic.com/media/02ca65_599952433001451593939054b04f652b~mv2.jpg", "author_name": "Liz Ogumbo", "author_avatar": "https://static.wixstatic.com/media/02ca65_7b9c92cf080f4b809edfbe81f3a5fe5e~mv2.jpg", "read_time": "3 min read", "published_at": "Jun 18, 2026"}, {"title": "Refashioning Denim for a Circular Luxury Future", "slug": "refashioning-denim", "category": "DeniMania", "excerpt": "Denim built the 20th century's idea of luxury \u2014 DeniMania\u2122 is rebuilding it for the 21st.", "content": "\n        <p class=\"post-meta\">DeniMania\u2122 Journal</p>\n        <p>Denim built the twentieth century's idea of everyday luxury \u2014 durable, democratic, endlessly reinvented. It's fitting, then, that denim is also where I've chosen to test what circular luxury can look like for the twenty-first.</p>\n        <p>DeniMania\u2122 didn't start as a sustainability initiative. It started as curiosity: what happens if a discarded pair of jeans is treated with the same seriousness as a bolt of silk? The answer, again and again, has been that the material has more to say than we give it credit for \u2014 you just have to be willing to unpick it, literally, to hear it.</p>\n        <p>Our 3R Methodology\u2122 \u2014 reclaim, reconstruct, retell \u2014 is less a production process than a discipline. Every collection has to answer three questions: what was this before, what is it becoming, and whose story does it now carry?</p>\n        <p>Circular fashion is often framed as a constraint. I'd argue the opposite. Some of our most ambitious silhouettes only exist because the material forced us to think differently. Waste, treated seriously, is one of the more generous design briefs I've worked with.</p>\n        ", "hero_image": "https://static.wixstatic.com/media/02ca65_ec3599d135ed412aab06cc6c2cf29351~mv2.png", "author_name": "Liz Ogumbo", "author_avatar": "https://static.wixstatic.com/media/02ca65_7b9c92cf080f4b809edfbe81f3a5fe5e~mv2.jpg", "read_time": "4 min read", "published_at": "May 27, 2026"}, {"title": "Why Africa Must Say No: We Are Not a Testing Ground", "slug": "why-africa-must-say-no", "category": "Cultural Architecture", "excerpt": "On autonomy, consent, and why the continent isn't anyone's testing ground.", "content": "\n        <p class=\"post-meta\">Advocacy Journal</p>\n        <p>There's a pattern that repeats across health, tech and agriculture alike: new interventions arrive on the continent framed as opportunity, tested at a scale and speed they'd never be permitted elsewhere. Consent gets treated as a formality instead of a foundation.</p>\n        <p>I make music and clothes and wine, but the thread underneath all of it is the same one that shows up here: who gets to author the story of a body, a community, a resource. Africa has been cast as backdrop for too long. It's time we're credited \u2014 and consulted \u2014 as authors.</p>\n        <p>Saying no isn't obstruction. It's the beginning of a real negotiation, one where communities set the terms instead of receiving them. That's the version of progress worth building toward.</p>\n        <p>This is advocacy I carry into every part of my work \u2014 because culture, health and autonomy were never separate conversations to begin with.</p>\n        ", "hero_image": "https://i.ytimg.com/vi/jhcMuVZlU0U/maxresdefault.jpg", "author_name": "Liz Ogumbo", "author_avatar": "https://static.wixstatic.com/media/02ca65_7b9c92cf080f4b809edfbe81f3a5fe5e~mv2.jpg", "read_time": "4 min read", "published_at": "Apr 9, 2026"}];

async function loadPost() {
  const slug = new URLSearchParams(location.search).get('slug');
  let post = null;
  try {
    const { data, error } = await sb.from('posts').select('*').eq('slug', slug).single();
    if (error) throw error;
    post = data;
  } catch (e) {
    post = FALLBACK_POSTS.find(p => p.slug === slug);
  }
  if (!post) {
    document.getElementById('ppTitle').textContent = 'Post not found';
    document.getElementById('ppContent').innerHTML = '<p>This post doesn\'t exist yet. <a href="journal.html" style="color:var(--coral);">Back to My Journal</a></p>';
    return;
  }
  document.title = post.title + ' — Liz Ogumbo®';
  document.getElementById('ppCategory').textContent = post.category;
  document.getElementById('ppTitle').textContent = post.title;
  document.getElementById('ppAvatar').src = post.author_avatar;
  document.getElementById('ppAuthor').textContent = post.author_name;
  const date = new Date(post.published_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  document.getElementById('ppMeta').textContent = date + ' · ' + post.read_time;
  document.getElementById('ppHero').src = post.hero_image;
  document.getElementById('ppHero').alt = post.title;
  document.getElementById('ppContent').innerHTML = post.content;
}
loadPost();
</script>
